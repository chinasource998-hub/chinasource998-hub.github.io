<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Source Logistics</title>

<style>
body{margin:0;font-family:-apple-system;background:#f5f7fb}

/* VIDEO HERO */
.hero{
position:relative;
height:100vh;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

/* TEXT */
.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

.hero-content h1{
font-size:32px;
}

.btn{
background:#1e63ff;
padding:12px 25px;
border-radius:8px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

/* SECTION */
.section{padding:30px 20px}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
}

/* FORM */
input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1e63ff;
color:white;
border:none;
border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:16px;
border-radius:50%;
color:white;
}
</style>
</head>

<body>

<!-- VIDEO HERO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-plane-takeoff-1571/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">
<h1>China to Guyana Shipping</h1>
<p>Fast • Reliable • Affordable</p>
<a class="btn" href="#quote">Get Quote</a>
</div>

</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>

<div class="card">✈️ Air Freight (5-10 days)</div>
<div class="card">🚢 Sea Freight (Bulk shipping)</div>
<div class="card">📦 Consolidation Service</div>
</div>

<!-- FORM -->
<div class="section" id="quote">
<h2>Get a Quote</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="WhatsApp Number">
<textarea id="product" placeholder="Product link"></textarea>

<button onclick="send()">Send Inquiry</button>
</div>

<a class="whatsapp" href="https://wa.me/5926638049">💬</a>

<script>
function send(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let product=document.getElementById("product").value;

let text=`New Order:%0AName:${name}%0APhone:${phone}%0AProduct:${product}`;
window.open(`https://wa.me/5926638049?text=${text}`);
}
</script>

</body>
</html>
