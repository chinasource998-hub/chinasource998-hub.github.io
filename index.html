<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Source Logistics</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fb;
}

/* HERO */
.hero{
    background:#0f3c88;
    color:white;
    padding:80px 20px;
    text-align:center;
}

.hero h1{
    font-size:28px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:14px 20px;
    background:#1e63ff;
    color:white;
    border-radius:10px;
    text-decoration:none;
}

/* SECTION */
.section{
    padding:30px 20px;
}

.card{
    background:white;
    padding:20px;
    margin:10px 0;
    border-radius:10px;
}

/* FORM */
.form{
    background:white;
    padding:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

.submit-btn{
    background:#1e63ff;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:16px;
    border-radius:50%;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Ship From China & USA to Guyana</h1>
    <p>Fast, Reliable & Affordable Logistics Service</p>

    <a class="btn" href="https://wa.me/5926638049">WhatsApp Now</a>
</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>

<div class="card">✈️ Air Freight – 5-10 Days</div>
<div class="card">🚢 Sea Freight – Bulk Shipping</div>
<div class="card">📦 Consolidation – Save Cost</div>
<div class="card">🧾 Customs Clearance – Full Service</div>
</div>

<!-- FORM -->
<div class="section">
<h2>Get a Quote</h2>

<div class="form">
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="WhatsApp Number">
<textarea id="product" placeholder="Paste product link here"></textarea>

<button class="submit-btn" onclick="send()">Send Inquiry</button>
</div>
</div>

<!-- FLOAT -->
<a class="whatsapp" href="https://wa.me/5926638049">💬</a>

<script>
function send(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let product = document.getElementById("product").value;

    let text = `New Order:%0AName: ${name}%0APhone: ${phone}%0AProduct: ${product}`;

    window.open(`https://wa.me/5926638049?text=${text}`);
}
</script>

</body>
</html>
