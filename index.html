<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Source Logistics</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb}

/* NAV */
.nav{
display:flex;justify-content:space-between;
padding:15px;background:#0f3c88;color:white;
}

/* HERO */
.hero{
background:#0f3c88;color:white;
padding:80px 20px;text-align:center;
}

/* SECTION */
.section{padding:30px 20px}

.card{
background:white;padding:20px;margin:10px 0;
border-radius:10px;
}

/* FORM */
input,select,textarea{
width:100%;padding:12px;margin:10px 0;
border-radius:8px;border:1px solid #ccc;
}

button{
width:100%;padding:12px;
background:#1e63ff;color:white;
border:none;border-radius:8px;
}

/* RESULT */
.result{
font-size:18px;color:#0f3c88;margin-top:10px;
}

/* ORDER LIST */
.order{
background:white;padding:10px;margin:5px 0;
border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;padding:16px;
border-radius:50%;color:white;
}
</style>
</head>

<body>

<div class="nav">
<b>China Source</b>
</div>

<div class="hero">
<h1>China to Guyana Shipping</h1>
<p>Fast & Affordable Logistics Service</p>
</div>

<div class="section">
<h2>Shipping Calculator</h2>

<select id="type">
<option value="air">Air Freight</option>
<option value="sea">Sea Freight</option>
</select>

<input id="weight" placeholder="Weight (kg)">
<textarea id="product" placeholder="Product link"></textarea>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="WhatsApp Number">

<button onclick="calculate()">Calculate Price</button>

<div class="result" id="result"></div>

<button onclick="send()">Send Order</button>
</div>

<!-- ORDER HISTORY -->
<div class="section">
<h2>Recent Orders</h2>
<div id="orders"></div>
</div>

<a class="whatsapp" href="https://wa.me/5926638049">💬</a>

<script>
let price=0;

function calculate(){
let type=document.getElementById("type").value;
let weight=document.getElementById("weight").value;

if(type=="air"){
price=weight*6;
}else{
price=weight*2;
}

document.getElementById("result").innerHTML="Estimated Price: $"+price;
}

function send(){
let type=document.getElementById("type").value;
let weight=document.getElementById("weight").value;
let product=document.getElementById("product").value;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

let order={
name:name,
phone:phone,
type:type,
weight:weight,
price:price
};

let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

loadOrders();

let text=`NEW ORDER:%0AName:${name}%0APhone:${phone}%0AType:${type}%0AWeight:${weight}kg%0APrice:$${price}%0AProduct:${product}`;
window.open(`https://wa.me/5926638049?text=${text}`);
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let html="";
orders.slice(-5).reverse().forEach(o=>{
html+=`<div class="order">${o.name} - ${o.weight}kg - $${o.price}</div>`;
});
document.getElementById("orders").innerHTML=html;
}

loadOrders();
</script>

</body>
</html>
