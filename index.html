<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Source Logistics</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f5f7fb;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#0f3c88;
color:white;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#0f3c88,#1e63ff);
color:white;
padding:100px 20px;
text-align:center;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero p{
opacity:0.9;
}

/* SECTION */
.section{
padding:25px 20px;
}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:15px;
margin:10px 0;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* INPUT */
input,select,textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#1e63ff,#4facfe);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

/* RESULT */
.result{
margin-top:10px;
font-size:18px;
color:#0f3c88;
font-weight:bold;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:16px;
border-radius:50%;
color:white;
font-size:20px;
}
</style>
</head>

<body>

<div class="nav">
China Source
</div>

<div class="hero">
<h1>China to Guyana Shipping</h1>
<p>Fast • Reliable • Affordable</p>
</div>

<div class="section">

<div class="card">
<h2>Shipping Calculator</h2>

<select id="type">
<option value="air">Air Freight</option>
<option value="sea">Sea Freight</option>
</select>

<input id="weight" placeholder="Weight (kg)">
<textarea id="product" placeholder="Product link"></textarea>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="WhatsApp Number">

<button onclick="calculate()">Calculate Price</button>

<div class="result" id="result"></div>

<button onclick="send()">Send Order</button>
</div>

</div>

<a class="whatsapp" href="https://wa.me/5926638049">💬</a>

<script>
let price=0;

function calculate(){
let type=document.getElementById("type").value;
let weight=document.getElementById("weight").value;

if(type=="air"){
price=weight*6;
}else{
price=weight*2;
}

document.getElementById("result").innerHTML="Estimated Price: $"+price;
}

function send(){
let type=document.getElementById("type").value;
let weight=document.getElementById("weight").value;
let product=document.getElementById("product").value;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

let text=`NEW ORDER:%0AName:${name}%0APhone:${phone}%0AType:${type}%0AWeight:${weight}kg%0APrice:$${price}%0AProduct:${product}`;

window.open(`https://wa.me/5926638049?text=${text}`);
}
</script>

</body>
</html>
